<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-labelledby="title desc">
    <title id="title">Core.Clips logo</title>
    <desc id="desc">A modern logotype: a gradient circular icon with two 'C' arcs and the word mark "Core.Clips".</desc>
    <defs>
        <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#f6339a"/>
            <stop offset="45%" stop-color="#e60076"/>
            <stop offset="100%" stop-color="#f6339a"/>
        </linearGradient>
        <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#fff" flood-opacity="0.18"/>
        </filter>
    </defs>

    <!-- Icon (circle + two 'C' arcs) -->
    <g transform="translate(60,20) rotate(-90 80 80)">
        <g filter="url(#softShadow)">
            <circle cx="80" cy="80" r="64" fill="url(#grad)"/>
        </g>

        <!-- Outer 'C' (thicker) -->
        <path d="M120 85
             a40 40 0 1 0 -80 0" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Inner 'C' (thinner) -->
        <g transform="translate(80 80) scale(0.7) translate(-80 -80)">
            <path d="M110 100
         a28 30 0 1 0 -60 0" fill="none" stroke="#ffffffab" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <!-- Filled dot -->
        <circle cx="80" cy="105" r="8" fill="#ffffff"/>

    </g>

    <!-- Wordmark -->
    <g transform="translate(220,125)">
        <text x="0" y="0" font-family="Inter, Roboto, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="64" fill="#e60076" letter-spacing="-0.5">
      Core.<tspan fill="#f6339a">Clips</tspan>
        </text>
    </g>
</svg>